<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alfajores by Thyare</title>

    <!-- Meta tags para WhatsApp -->
    <meta property="og:title" content="Alfajores by Thyare">
    <meta property="og:description" content="¡Hacé tu pedido de alfajores artesanales!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=600">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #A90072;
            --primary-light: #C41A8C;
            --primary-dark: #7A0055;
            --accent: #000000;
            --bg: #F2E9D8;
            --card: #FFFFFF;
            --text: #000000;
            --text-light: #666666;
            --text-muted: #999999;
            --success: #4CAF50;
            --danger: #E74C3C;
            --warning: #FF9800;
            --shadow: 0 4px 20px rgba(169, 0, 114, 0.12);
            --shadow-hover: 0 8px 30px rgba(169, 0, 114, 0.2);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* Header */
        .header {
            background: var(--primary);
            padding: 24px 20px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .header .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 0.75rem;
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Info bar */
        .info-bar {
            background: var(--card);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(169, 0, 114, 0.08);
            font-size: 0.78rem;
        }

        .info-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-light);
        }

        .info-bar i {
            color: var(--primary);
            font-size: 0.85rem;
        }

        /* Product Grid */
        .products-container {
            padding: 24px 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 18px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .product-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            border: 1px solid rgba(169, 0, 114, 0.06);
        }

        .product-card:active {
            transform: scale(0.97);
        }

        .product-card.out-of-stock {
            opacity: 0.55;
        }

        .product-card.out-of-stock::after {
            content: "AGOTADO";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-12deg);
            background: var(--danger);
            color: white;
            padding: 8px 18px;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 6px;
            z-index: 10;
            letter-spacing: 3px;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }

        .product-image {
            width: 100%;
            height: 130px;
            object-fit: cover;
            background: linear-gradient(135deg, #F2E9D8 0%, #E8DDD0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            position: relative;
        }

        .product-info {
            padding: 14px 12px 16px;
        }

        .product-name {
            font-weight: 600;
            font-size: 0.92rem;
            margin-bottom: 2px;
            color: var(--text);
        }

        .product-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 6px;
        }

        .product-price .promo {
            font-size: 0.72rem;
            color: var(--primary);
            font-weight: 500;
            display: block;
            margin-top: 2px;
            opacity: 0.8;
        }

        .stock-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.68rem;
            padding: 3px 8px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .stock-badge.ok {
            background: rgba(76, 175, 80, 0.1);
            color: var(--success);
        }

        .stock-badge.low {
            background: rgba(255, 152, 0, 0.1);
            color: var(--warning);
        }

        .stock-badge.out {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
        }

        /* Quantity selector */
        .quantity-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: 500;
        }

        .qty-btn:active {
            background: var(--primary-dark);
            transform: scale(0.9);
        }

        .qty-btn:disabled {
            background: #ddd;
            cursor: not-allowed;
        }

        .qty-value {
            font-weight: 600;
            font-size: 0.95rem;
            min-width: 28px;
            text-align: center;
            color: var(--text);
        }

        .add-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 0.5px;
        }

        .add-btn:active {
            transform: scale(0.97);
            background: var(--primary-dark);
        }

        .add-btn:disabled {
            background: #ddd;
            cursor: not-allowed;
        }

        /* Special card for Tradicional */
        .product-card.special {
            grid-column: span 2;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: linear-gradient(135deg, var(--card) 0%, #FFF5F9 100%);
            border: 2px solid rgba(169, 0, 114, 0.1);
        }

        .product-card.special .product-image {
            width: 90px;
            height: 90px;
            border-radius: 16px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #F2E9D8 0%, #E8C8D8 100%);
        }

        .product-card.special .product-info {
            flex: 1;
            padding: 0;
        }

        .special-badge {
            background: var(--primary);
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        /* Cart Bar (Fixed Bottom) */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            padding: 14px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid var(--primary);
        }

        .cart-info {
            display: flex;
            flex-direction: column;
        }

        .cart-items {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .cart-total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .view-cart-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .view-cart-btn:active {
            transform: scale(0.95);
            background: var(--primary-dark);
        }

        .view-cart-btn .badge {
            background: white;
            color: var(--primary);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* Cart Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            border-radius: 28px 28px 0 0;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            padding: 22px 20px 18px;
            border-bottom: 1px solid rgba(169, 0, 114, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.15rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.6rem;
            color: var(--text-muted);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .close-btn:active {
            background: var(--bg);
        }

        .modal-body {
            padding: 20px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .cart-item-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #F2E9D8 0%, #E8DDD0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text);
        }

        .cart-item-price {
            color: var(--text-muted);
            font-size: 0.78rem;
            margin-top: 2px;
        }

        .cart-item-total {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.95rem;
        }

        .remove-item {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .remove-item:active {
            background: rgba(231, 76, 60, 0.1);
        }

        .cart-summary {
            margin-top: 20px;
            padding: 16px;
            background: var(--bg);
            border-radius: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.88rem;
            color: var(--text-light);
        }

        .summary-row.total {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
            border-top: 1px solid rgba(169, 0, 114, 0.15);
            padding-top: 10px;
            margin-top: 10px;
        }

        /* Form - Simplified */
        .form-section {
            margin-top: 24px;
        }

        .form-section h3 {
            font-size: 0.95rem;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E8DDD0;
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
            color: var(--text);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(169, 0, 114, 0.08);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-hint {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .whatsapp-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .whatsapp-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(37, 211, 102, 0.2);
        }

        .whatsapp-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        .empty-cart {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }

        .empty-cart i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.4;
            color: var(--primary);
        }

        .empty-cart p {
            font-size: 0.95rem;
        }

        .empty-cart p:last-child {
            font-size: 0.8rem;
            margin-top: 6px;
            opacity: 0.7;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--success);
            color: white;
            padding: 14px 28px;
            border-radius: 25px;
            font-weight: 500;
            z-index: 300;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        /* Responsive */
        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .product-card.special {
                grid-column: span 3;
            }

            .modal-content {
                border-radius: 28px;
                margin-bottom: 20px;
                max-height: 85vh;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>Alfajores</h1>
        <div class="subtitle">by Thyare</div>
    </div>

    <div class="info-bar">
        <span><i class="fas fa-motorcycle"></i> Envíos a domicilio</span>
        <span><i class="fas fa-clock"></i> Pedidos hasta 18hs</span>
    </div>

    <div class="products-container">
        <div class="section-title">
            <i class="fas fa-cookie-bite"></i>
            Nuestros Sabores
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be rendered here -->
        </div>
    </div>

    <!-- Cart Bar -->
    <div class="cart-bar" id="cartBar" style="display: none;">
        <div class="cart-info">
            <span class="cart-items" id="cartItemsCount">0 items</span>
            <span class="cart-total" id="cartTotal">$0</span>
        </div>
        <button class="view-cart-btn" onclick="openCart()">
            <i class="fas fa-shopping-bag"></i>
            Ver pedido
            <span class="badge" id="cartBadge">0</span>
        </button>
    </div>

    <!-- Cart Modal -->
    <div class="modal-overlay" id="cartModal" onclick="closeCart(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2><i class="fas fa-shopping-bag"></i> Tu Pedido</h2>
                <button class="close-btn" onclick="closeCart()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="cartItemsList"></div>

                <div class="cart-summary" id="cartSummary" style="display: none;">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">$0</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="totalFinal">$0</span>
                    </div>
                </div>

                <div class="form-section" id="formSection" style="display: none;">
                    <h3><i class="fas fa-user"></i> Tus Datos</h3>
                    <div class="form-group">
                        <label>Nombre completo *</label>
                        <input type="text" id="customerName" placeholder="Ej: María González">
                    </div>
                    <div class="form-group">
                        <label>Teléfono *</label>
                        <input type="tel" id="customerPhone" placeholder="Ej: 11 6789-0123">
                        <div class="form-hint">
                            <i class="fas fa-info-circle" style="font-size: 0.65rem;"></i>
                            Coordinaremos fecha y dirección de entrega por WhatsApp
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Notas adicionales</label>
                        <textarea id="customerNotes" placeholder="Ej: Para regalo, sin azúcar..."></textarea>
                    </div>

                    <button class="whatsapp-btn" id="whatsappBtn" onclick="sendOrder()">
                        <i class="fab fa-whatsapp"></i>
                        Enviar pedido por WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Producto agregado</span>
    </div>

    <script>
        // Product data
        const products = [
            { id: 'nuez', name: 'Nuez', emoji: '🌰', price: 1000, stock: 15 },
            { id: 'mani', name: 'Maní', emoji: '🥜', price: 1000, stock: 12 },
            { id: 'frambuesa', name: 'Frambuesa', emoji: '🍓', price: 1000, stock: 8 },
            { id: 'bonobon', name: 'Bonobon', emoji: '🍫', price: 1000, stock: 20 },
            { id: 'oreo', name: 'Oreo', emoji: '🍪', price: 1000, stock: 5 },
            { id: 'nutella', name: 'Nutella', emoji: '🍫', price: 1000, stock: 18 },
        ];

        const specialProduct = {
            id: 'tradicional',
            name: 'Tradicional',
            emoji: '🍪',
            price: 1000,
            stock: 25,
            promo: '2 x $1,000',
            isSpecial: true
        };

        // Cart state
        let cart = {};

        // Render products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            // Render regular products
            products.forEach(product => {
                const card = createProductCard(product);
                grid.appendChild(card);
            });

            // Render special product (Tradicional)
            const specialCard = createSpecialCard(specialProduct);
            grid.appendChild(specialCard);
        }

        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = `product-card ${product.stock <= 0 ? 'out-of-stock' : ''}`;
            card.id = `card-${product.id}`;

            const stockClass = product.stock <= 0 ? 'out' : product.stock <= 5 ? 'low' : 'ok';
            const stockText = product.stock <= 0 ? 'Sin stock' : product.stock <= 5 ? `¡Solo ${product.stock}!` : `${product.stock} disponibles`;

            card.innerHTML = `
                <div class="product-image">${product.emoji}</div>
                <div class="product-info">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">$${product.price.toLocaleString()}</div>
                    <div class="stock-badge ${stockClass}">
                        <i class="fas fa-circle" style="font-size: 5px;"></i>
                        ${stockText}
                    </div>
                    <div class="quantity-selector">
                        <button class="qty-btn" onclick="updateQty('${product.id}', -1)" ${product.stock <= 0 ? 'disabled' : ''}>-</button>
                        <span class="qty-value" id="qty-${product.id}">0</span>
                        <button class="qty-btn" onclick="updateQty('${product.id}', 1)" ${product.stock <= 0 ? 'disabled' : ''}>+</button>
                    </div>
                    <button class="add-btn" onclick="addToCart('${product.id}')" ${product.stock <= 0 ? 'disabled' : ''}>
                        <i class="fas fa-plus"></i> Agregar
                    </button>
                </div>
            `;

            return card;
        }

        function createSpecialCard(product) {
            const card = document.createElement('div');
            card.className = `product-card special ${product.stock <= 0 ? 'out-of-stock' : ''}`;
            card.id = `card-${product.id}`;

            const stockClass = product.stock <= 0 ? 'out' : product.stock <= 5 ? 'low' : 'ok';
            const stockText = product.stock <= 0 ? 'Sin stock' : product.stock <= 5 ? `¡Solo ${product.stock}!` : `${product.stock} disponibles`;

            card.innerHTML = `
                <div class="product-image">${product.emoji}</div>
                <div class="product-info">
                    <span class="special-badge">PROMO</span>
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">
                        $${product.price.toLocaleString()}
                        <span class="promo">${product.promo}</span>
                    </div>
                    <div class="stock-badge ${stockClass}">
                        <i class="fas fa-circle" style="font-size: 5px;"></i>
                        ${stockText}
                    </div>
                    <div class="quantity-selector">
                        <button class="qty-btn" onclick="updateQty('${product.id}', -1)" ${product.stock <= 0 ? 'disabled' : ''}>-</button>
                        <span class="qty-value" id="qty-${product.id}">0</span>
                        <button class="qty-btn" onclick="updateQty('${product.id}', 1)" ${product.stock <= 0 ? 'disabled' : ''}>+</button>
                    </div>
                    <button class="add-btn" onclick="addToCart('${product.id}')" ${product.stock <= 0 ? 'disabled' : ''}>
                        <i class="fas fa-plus"></i> Agregar
                    </button>
                </div>
            `;

            return card;
        }

        // Update quantity display
        function updateQty(productId, change) {
            const qtyEl = document.getElementById(`qty-${productId}`);
            let current = parseInt(qtyEl.textContent);
            let newQty = current + change;

            if (newQty < 0) newQty = 0;

            // Check stock
            const product = [...products, specialProduct].find(p => p.id === productId);
            if (newQty > product.stock) {
                showToast(`¡Solo quedan ${product.stock} unidades!`, 'warning');
                return;
            }

            qtyEl.textContent = newQty;
        }

        // Add to cart
        function addToCart(productId) {
            const qtyEl = document.getElementById(`qty-${productId}`);
            const qty = parseInt(qtyEl.textContent);

            if (qty === 0) return;

            const product = [...products, specialProduct].find(p => p.id === productId);

            if (qty > product.stock) {
                showToast('No hay suficiente stock', 'error');
                return;
            }

            if (cart[productId]) {
                cart[productId].qty += qty;
            } else {
                cart[productId] = {
                    ...product,
                    qty: qty
                };
            }

            // Reset quantity display
            qtyEl.textContent = '0';

            updateCartBar();
            showToast(`${product.name} agregado (${qty})`);
        }

        // Update cart bar
        function updateCartBar() {
            const cartBar = document.getElementById('cartBar');
            const items = Object.values(cart);

            if (items.length === 0) {
                cartBar.style.display = 'none';
                return;
            }

            cartBar.style.display = 'flex';

            const totalItems = items.reduce((sum, item) => sum + item.qty, 0);
            const totalPrice = items.reduce((sum, item) => {
                if (item.id === 'tradicional') {
                    const pairs = Math.floor(item.qty / 2);
                    const singles = item.qty % 2;
                    return sum + (pairs * 1000) + (singles * 1000);
                }
                return sum + (item.price * item.qty);
            }, 0);

            document.getElementById('cartItemsCount').textContent = 
                `${totalItems} ${totalItems === 1 ? 'item' : 'items'}`;
            document.getElementById('cartTotal').textContent = `$${totalPrice.toLocaleString()}`;
            document.getElementById('cartBadge').textContent = totalItems;
        }

        // Open cart modal
        function openCart() {
            renderCartItems();
            document.getElementById('cartModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close cart modal
        function closeCart(event) {
            if (!event || event.target === document.getElementById('cartModal')) {
                document.getElementById('cartModal').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // Render cart items
        function renderCartItems() {
            const container = document.getElementById('cartItemsList');
            const items = Object.values(cart);

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-bag"></i>
                        <p>Tu carrito está vacío</p>
                        <p>¡Agregá algunos alfajores!</p>
                    </div>
                `;
                document.getElementById('cartSummary').style.display = 'none';
                document.getElementById('formSection').style.display = 'none';
                return;
            }

            let html = '';
            let subtotal = 0;

            items.forEach(item => {
                let itemTotal = item.price * item.qty;
                let itemDisplay = `${item.qty}x $${item.price.toLocaleString()}`;

                if (item.id === 'tradicional') {
                    const pairs = Math.floor(item.qty / 2);
                    const singles = item.qty % 2;
                    itemTotal = (pairs * 1000) + (singles * 1000);
                    if (pairs > 0) {
                        itemDisplay = `${item.qty}x (Promo 2x$1000)`;
                    }
                }

                subtotal += itemTotal;

                html += `
                    <div class="cart-item">
                        <div class="cart-item-icon">${item.emoji}</div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${itemDisplay}</div>
                        </div>
                        <div class="cart-item-total">$${itemTotal.toLocaleString()}</div>
                        <button class="remove-item" onclick="removeFromCart('${item.id}')">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('cartSummary').style.display = 'block';
            document.getElementById('subtotal').textContent = `$${subtotal.toLocaleString()}`;
            document.getElementById('totalFinal').textContent = `$${subtotal.toLocaleString()}`;
            document.getElementById('formSection').style.display = 'block';
        }

        // Remove from cart
        function removeFromCart(productId) {
            delete cart[productId];
            renderCartItems();
            updateCartBar();
        }

        // Send order via WhatsApp
        function sendOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const notes = document.getElementById('customerNotes').value.trim();

            if (!name || !phone) {
                showToast('Por favor completá nombre y teléfono', 'error');
                return;
            }

            // Build WhatsApp message
            let message = `🍪 *NUEVO PEDIDO - Alfajores by Thyare*\n\n`;
            message += `👤 *Cliente:* ${name}\n`;
            message += `📱 *Teléfono:* ${phone}\n`;
            if (notes) message += `📝 *Notas:* ${notes}\n`;
            message += `\n*PEDIDO:*\n`;

            let total = 0;
            Object.values(cart).forEach(item => {
                let itemTotal = item.price * item.qty;
                if (item.id === 'tradicional') {
                    const pairs = Math.floor(item.qty / 2);
                    const singles = item.qty % 2;
                    itemTotal = (pairs * 1000) + (singles * 1000);
                }
                total += itemTotal;
                message += `• ${item.qty}x ${item.name} - $${itemTotal.toLocaleString()}\n`;
            });

            message += `\n💰 *TOTAL: $${total.toLocaleString()}*\n\n`;
            message += `¿Confirmás el pedido? ✅`;

            // IMPORTANT: Replace with your friend's WhatsApp number
            // Format: 56998684903 (country code + area code + number, no +, no spaces)
            const whatsappNumber = '56998684903';

            const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

            // Open WhatsApp
            window.open(url, '_blank');

            // Also send to Google Sheets (optional, will be configured later)
            sendToGoogleSheets({
                name, phone, notes,
                items: Object.values(cart),
                total
            });

            // Clear cart
            cart = {};
            updateCartBar();
            closeCart();
            showToast('¡Pedido enviado! 📱', 'success');
        }

        // Send to Google Sheets (placeholder - will be configured)
        function sendToGoogleSheets(data) {
            console.log('Sending to Google Sheets:', data);

            const scriptURL = 'https://script.google.com/macros/s/AKfycbyawolQFSnY5mDj7oDnSMuKmXFzSd4z83FdYGyV8KJYNfl8gLzydLD4bgGvbKFYNwPQ/exec';

            // Uncomment when configured:
            // fetch(scriptURL, {
            //     method: 'POST',
            //     body: JSON.stringify(data),
            //     headers: { 'Content-Type': 'application/json' }
            // }).catch(err => console.log('Sheet update failed:', err));
        }

        // Show toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');

            toastMessage.textContent = message;
            toast.style.background = type === 'error' ? '#E74C3C' : type === 'warning' ? '#FF9800' : '#4CAF50';

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderProducts();
        });
    </script>
</body>
